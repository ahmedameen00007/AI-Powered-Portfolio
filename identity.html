<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ahmed Ameen's Personal Identity and Branding">
    <title>Personal Identity | Ahmed Ameen</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand-primary: #491fdf;
            --brand-secondary: #6b46f6;
            --charcoal-bg: #050505;
            --brand-glow: 0 0 30px rgba(73, 31, 223, 0.2);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--charcoal-bg);
            color: #f3f4f6;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(73, 31, 223, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(107, 70, 246, 0.05) 0%, transparent 40%);
        }

        .identity-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--spacing-64) var(--spacing-24);
        }

        .identity-header {
            text-align: center;
            margin-bottom: var(--spacing-80);
            position: relative;
        }

        .identity-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: var(--spacing-16);
            background: linear-gradient(135deg, #fff 30%, var(--brand-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .identity-subtitle {
            color: var(--brand-secondary);
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 800;
            font-size: var(--text-sm);
            opacity: 0.9;
        }

        .identity-grid {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-64);
            margin-top: var(--spacing-64);
        }

        .identity-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(107, 70, 246, 0.15);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            will-change: transform, opacity;
        }

        .identity-card:hover {
            transform: translateY(-10px);
            border-color: var(--brand-primary);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), var(--brand-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .identity-image-box {
            width: 100%;
            height: auto;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .identity-image-box img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 0;
        }

        .identity-card:hover .identity-image-box img {
            transform: scale(1.05);
        }

        .back-btn-brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            margin-bottom: var(--spacing-48);
            transition: all 0.4s ease;
            opacity: 0.5;
            letter-spacing: 2px;
            font-size: var(--text-sm);
        }

        .back-btn-brand:hover {
            opacity: 1;
            color: var(--brand-secondary);
            transform: translateX(-5px);
        }

        .identity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(107, 70, 246, 0.1),
                    transparent);
            transform: skewX(-25deg);
            transition: 0.8s;
            pointer-events: none;
            z-index: 5;
        }

        .identity-card:hover::before {
            left: 150%;
        }
    </style>
</head>

<body class="animate-fade-in">
    <div class="identity-container">
        <a href="index.html?return=true" class="back-btn-brand">
            <span>←</span> RETURN TO JOURNEY
        </a>

        <header class="identity-header">
            <p class="identity-subtitle animate-fade-up">Personal Branding</p>
            <h1 class="identity-title animate-fade-up">Identity</h1>
        </header>

        <div class="identity-grid">
            <!-- Slide 1 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.05s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/1.png" alt="Identity Slide 1" loading="lazy" decoding="async">
                </div>
            </article>

            <!-- Slide 2 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.1s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/2.png" alt="Identity Slide 2" loading="lazy" decoding="async">
                </div>
            </article>

            <!-- Slide 3 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.15s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/3.png" alt="Identity Slide 3" loading="lazy" decoding="async">
                </div>
            </article>

            <!-- Slide 4 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.2s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/4.png" alt="Identity Slide 4" loading="lazy" decoding="async">
                </div>
            </article>
            
            <!-- Slide 5 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.25s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/5.png" alt="Identity Slide 5" loading="lazy" decoding="async">
                </div>
            </article>
            
            <!-- Slide 6 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.3s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/6.png" alt="Identity Slide 6" loading="lazy" decoding="async">
                </div>
            </article>
            
            <!-- Slide 7 -->
            <article class="identity-card animate-fade-up" style="animation-delay: 0.35s;">
                <div class="identity-image-box">
                    <img src="personal_branding/Identity/7.png" alt="Identity Slide 7" loading="lazy" decoding="async">
                </div>
            </article>
        </div>
    </div>

    <script src="js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initAnimations === 'function') {
                initAnimations();
            }
        });
    </script>
</body>
</html>
